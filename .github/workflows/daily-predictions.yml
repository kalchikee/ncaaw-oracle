# NCAAW Oracle v4.1 — Daily Predictions Workflow
# Runs every day at 9 AM ET (1300 UTC) during the WBB season (Nov–Apr)
# Fetches schedule, runs pipeline, sends Discord embed

name: Daily Predictions

on:
  schedule:
    - cron: '0 13 * * *'   # 9 AM ET daily
  workflow_dispatch:        # allow manual trigger

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write   # needed to commit predictions/<date>.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get today's date (ET)
        id: date
        run: echo "date=$(TZ='America/New_York' date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore SQLite database artifact
        uses: actions/download-artifact@v4
        with:
          name: oracle-db
          path: data/
        continue-on-error: true   # OK if no prior artifact (first run)

      - name: Check season gate
        id: season_check
        run: |
          MONTH=$(date +%-m)
          # Active season: November (11) through April (4)
          if [ "$MONTH" -ge 11 ] || [ "$MONTH" -le 4 ]; then
            echo "active=true" >> $GITHUB_OUTPUT
            echo "Season is active (month $MONTH)"
          else
            echo "active=false" >> $GITHUB_OUTPUT
            echo "Season is dormant (month $MONTH) — skipping"
          fi

      - name: Run prediction pipeline
        if: steps.season_check.outputs.active == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          DB_PATH: ./data/oracle.sqlite
          NODE_ENV: production
          KALSHI_MIN_PROB: '0.58'
        run: npm start -- --alert morning

      - name: Commit predictions JSON
        if: steps.season_check.outputs.active == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add predictions/${{ steps.date.outputs.date }}.json || true
          if ! git diff --staged --quiet; then
            git commit -m "NCAAW predictions ${{ steps.date.outputs.date }}"
            git push
          else
            echo "No predictions file to commit"
          fi

      - name: Upload SQLite database artifact
        if: steps.season_check.outputs.active == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: oracle-db
          path: data/oracle.sqlite
          retention-days: 90
          overwrite: true

