# NCAAW Oracle v4.1 — Weekly Recap Workflow
# Runs every Monday at 10 AM ET (1400 UTC) during the WBB season

name: Weekly Recap

on:
  schedule:
    - cron: '0 14 * * 1'   # Monday 10 AM ET
  workflow_dispatch:

jobs:
  recap:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore SQLite database
        uses: actions/download-artifact@v4
        with:
          name: oracle-db
          path: data/
        continue-on-error: true

      - name: Check season gate
        id: season_check
        run: |
          MONTH=$(date +%-m)
          if [ "$MONTH" -ge 11 ] || [ "$MONTH" -le 4 ]; then
            echo "active=true" >> $GITHUB_OUTPUT
          else
            echo "active=false" >> $GITHUB_OUTPUT
            echo "Season dormant — skipping recap"
          fi

      - name: Send weekly recap embed
        if: steps.season_check.outputs.active == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DB_PATH: ./data/oracle.sqlite
          NODE_ENV: production
        run: npm start -- --alert weekly

      - name: Upload database artifact
        if: steps.season_check.outputs.active == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: oracle-db
          path: data/oracle.sqlite
          retention-days: 90
          overwrite: true

